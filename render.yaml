services:
  - type: web
    name: springboot-app
    runtime: java
    plan: free
    buildCommand: "./mvnw clean install"
    startCommand: "java -jar target/*.jar"
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://your-db-host:3306/your-db-name
      - key: SPRING_DATASOURCE_USERNAME
        value: your-username
      - key: SPRING_DATASOURCE_PASSWORD
        value: your-password
